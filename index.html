<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin THR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ramadhan-bg"></div>
        <div class="wrapper">
            <h1>Spin THR Kamu</h1>
            <button class="btn" onclick="goLink()">My GitHub</button>
                <div class="container">
                    <div class="spinBtn">Spin</div>
                    <div class="wheel">
                        <div class="number" style="--i:1;--clr:#db7093;">
                            <span>5000</span></div>
                        <div class="number" style="--i:2;--clr:#20b2aa;">
                            <span>1000</span></div>
                        <div class="number" style="--i:3;--clr:#daa520;">
                            <span>2000</span></div>
                        <div class="number" style="--i:4;--clr:#ff340f;">
                            <span>500</span></div>
                        <div class="number" style="--i:5;--clr:#4169e1;">
                            <span>10.000</span></div>
                        <div class="number" style="--i:6;--clr:#3cb371;">
                            <span>20.000</span></div>
                        <div class="number" style="--i:7;--clr:#d63e92;">
                            <span>50.000</span></div>
                        <div class="number" style="--i:8;--clr:#ff7f50;">
                            <span>100.000</span></div>
                        </div>
                    </div>
            </div>
    <audio id="bgMusic" loop>
    <source src="ramadhan.mp3" type="audio/mpeg">
</audio>
    <script>
        let wheel = document.querySelector('.wheel');
        let spinBtn = document.querySelector('.spinBtn');
        let value = Math.ceil(Math.random() * 3600);

        spinBtn.onclick = function(){
            wheel.style.transform = "rotate(" + value + "deg)"

            value += Math.ceil(Math.random() * 3600);
        }
const container = document.querySelector('.ramadhan-bg');

for (let i = 0; i < 10; i++) { // jumlah sedikit biar nggak rame
    let img = document.createElement('img');
    img.src = 'bg.png'; // gambar duit lo
    img.classList.add('ramadhan');

    // posisi random
    img.style.left = Math.random() * 100 + 'vw';

    // ukuran random
    img.style.width = (30 + Math.random() * 40) + 'px';

    // speed random
    img.style.animationDuration = (5 + Math.random() * 10) + 's';

    // delay random
    img.style.animationDelay = Math.random() * 5 + 's';

    container.appendChild(img);
}
        const music = document.getElementById("bgMusic");

// sekali klik langsung aktif
document.addEventListener("click", () => {
    music.play();
}, { once: true });
        function goLink() {
    window.location.href = "https://google.com";
}
    </script>
</body>
</html>
